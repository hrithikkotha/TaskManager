name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

# 🔑 Grant the Actions bot write access to push to gh-pages branch
permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: TaskManager/package-lock.json

      - name: Install dependencies
        working-directory: TaskManager
        run: npm ci

      - name: Build project
        working-directory: TaskManager
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./TaskManager/dist
          publish_branch: gh-pages
